coverage:
  status:
    project:
      default:
        target: 60% # Combined-coverage floor across all test legs (ratchet up as coverage improves)
        threshold: 0%
        informational: false
    patch:
      default:
        target: auto
        threshold: 5%
        informational: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true

flags:
  unit:
    paths:
      - src/orb/
    carryforward: true

ignore:
  - "tests/"
  - "docs/"
  - "scripts/"
