name: 'Get Project Configuration'
description: 'Get project configuration from Makefile'
outputs:
  python-versions:
    description: 'JSON array of Python versions'
    value: ${{ steps.config.outputs.python-versions }}
  default-python-version:
    description: 'Default Python version'
    value: ${{ steps.config.outputs.default-python-version }}
  container-registry:
    description: 'Container registry'
    value: ${{ steps.config.outputs.container-registry }}
  container-image:
    description: 'Container image name'
    value: ${{ steps.config.outputs.container-image }}
  package-version:
    description: 'Single version format compatible with PyPI packages, Docker tags, and Git tags'
    value: ${{ steps.config.outputs.package-version }}
  is-release:
    description: 'Whether this is a release build'
    value: ${{ steps.config.outputs.is-release }}
  pypi-name:
    description: 'PyPI package name'
    value: ${{ steps.config.outputs.pypi-name }}
  build-platforms:
    description: 'Comma-joined list of container build platforms (e.g. linux/amd64,linux/arm64)'
    value: ${{ steps.config.outputs.build-platforms }}
  short-name:
    description: 'Short CLI command name (project.short_name in .project.yml)'
    value: ${{ steps.config.outputs.short-name }}
runs:
  using: 'composite'
  steps:
    - name: Install yq
      uses: mikefarah/yq@065b200af9851db0d5132f50bc10b1406ea5c0a8  # v4.50.1

    - name: Get configuration from project config
      id: config
      shell: bash
      run: |
        # Force tostring so 3.10 is never silently truncated to 3.1 by YAML float parsing
        DEFAULT_PYTHON_VERSION=$(yq '.python.default_version | tostring' .project.yml)
        PYTHON_VERSIONS=$(yq -o json '.python.versions' .project.yml | tr -d '\n')
        CONTAINER_REGISTRY=$(yq '.repository.registry // "ghcr.io"' .project.yml)
        REPO_ORG=$(yq '.repository.org' .project.yml)
        REPO_NAME=$(yq '.repository.name' .project.yml)
        CONTAINER_IMAGE="$REPO_ORG/$REPO_NAME"
        PYPI_NAME=$(yq '.project.pypi_name' .project.yml)
        BUILD_PLATFORMS=$(yq '.build.platforms | join(",")' .project.yml)
        SHORT_NAME=$(yq '.project.short_name' .project.yml)
        
        # Centralized version generation using Makefile infrastructure
        if [[ "${{ github.event_name }}" == "release" ]]; then
          # Only actual release events are treated as releases
          PACKAGE_VERSION=$(IS_RELEASE=true make -s get-version)
          IS_RELEASE="true"
        else
          # All other events are development builds
          PACKAGE_VERSION=$(make -s get-version)
          IS_RELEASE="false"
        fi
        
        {
          echo "default-python-version=$DEFAULT_PYTHON_VERSION"
          echo "python-versions=$PYTHON_VERSIONS"
          echo "container-registry=$CONTAINER_REGISTRY"
          echo "container-image=$CONTAINER_IMAGE"
          echo "package-version=$PACKAGE_VERSION"
          echo "is-release=$IS_RELEASE"
          echo "pypi-name=$PYPI_NAME"
          echo "build-platforms=$BUILD_PLATFORMS"
          echo "short-name=$SHORT_NAME"
        } >> "$GITHUB_OUTPUT"

        echo "Default Python version: $DEFAULT_PYTHON_VERSION"
        echo "Python versions: $PYTHON_VERSIONS"
        echo "Container registry: $CONTAINER_REGISTRY"
        echo "Container image: $CONTAINER_IMAGE"
        echo "Package version: $PACKAGE_VERSION"
        echo "Is release: $IS_RELEASE"
        echo "PyPI name: $PYPI_NAME"
        echo "Build platforms: $BUILD_PLATFORMS"
        echo "Short name: $SHORT_NAME"
