name: "Open Resource Broker CodeQL Config"

disable-default-queries: false

queries:
  - uses: security-and-quality
  - uses: security-extended

paths-ignore:
  - "tests/**"
  - "docs/**"
  - "examples/**"
  - "scripts/**"
  - ".venv/**"
  - "build/**"
  - "dist/**"
  # Generated Alembic migration boilerplate. Each migration module MUST define
  # the revision/down_revision/branch_labels/depends_on globals — Alembic reads
  # them by name to build the revision graph, so they are never referenced from
  # within the module and trip py/unused-global-variable as a universal false
  # positive. These modules contain only static schema DDL via the Alembic/
  # SQLAlchemy API (no request handling, no user input, no injection surface),
  # so excluding them from code-quality scanning loses no security coverage.
  - "src/orb/infrastructure/storage/sql/migrations/versions/**"

paths:
  - "src/**"

packs:
  - codeql/python-queries:AlertSuppression.ql
  - codeql/python-queries:Security/CWE-022/PathInjection.ql
  - codeql/python-queries:Security/CWE-079/XSS.ql
  - codeql/python-queries:Security/CWE-089/SqlInjection.ql
  - codeql/python-queries:Security/CWE-094/CodeInjection.ql
  - codeql/python-queries:Security/CWE-295/MissingHostnameVerification.ql
  - codeql/python-queries:Security/CWE-327/BrokenCryptoAlgorithm.ql
  - codeql/python-queries:Security/CWE-502/UnsafeDeserialization.ql
