name: Release Pipeline

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      # One-off SDK bootstrap: publish a single SDK to a single registry
      # WITHOUT cutting a release. Used to seed a package name on a public
      # registry the first time (e.g. before npm trusted-publishing can be
      # attached, which requires the package to already exist). Leave
      # bootstrap_sdk = none for a normal manual dispatch (which publishes
      # nothing — every real publish job is release-gated).
      bootstrap_sdk:
        description: 'One-off: which SDK to publish (maven = java + kotlin)'
        required: false
        default: 'none'
        type: choice
        options: [none, npm, maven, nuget]
      bootstrap_destination:
        description: 'One-off: destination registry for the chosen SDK'
        required: false
        default: 'github'
        type: choice
        options: [github, npmjs, central, nuget_org]
      auth_mode:
        # Bootstrap's main use is the one-off token seed: npm/NuGet trusted
        # publishing both require the package to already exist before a
        # trusted-publisher policy can be attached, so the FIRST publish must use
        # a token. Defaults to 'token' for that reason; pick 'trusted' to bootstrap
        # via OIDC once a policy exists. Applies to npm + NuGet only (maven is
        # always token+GPG).
        description: 'One-off: publishing auth for the chosen SDK (npm/NuGet only)'
        required: false
        default: 'token'
        type: choice
        options: [trusted, token]

permissions:
  contents: read
  packages: write
  pages: write

concurrency:
  group: production-release-${{ github.event.release.tag_name || inputs.version }}
  cancel-in-progress: false

jobs:
  config:
    name: Get Configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      python-versions: ${{ steps.config.outputs.python-versions }}
      default-python-version: ${{ steps.config.outputs.default-python-version }}
      container-registry: ${{ steps.config.outputs.container-registry }}
      container-image: ${{ steps.config.outputs.container-image }}
      package-version: ${{ steps.config.outputs.package-version }}
      is-release: ${{ steps.config.outputs.is-release }}
      pypi-name: ${{ steps.config.outputs.pypi-name }}
      build-platforms: ${{ steps.config.outputs.build-platforms }}
      short-name: ${{ steps.config.outputs.short-name }}
      npm-targets: ${{ steps.config.outputs.npm-targets }}
      maven-targets: ${{ steps.config.outputs.maven-targets }}
      nuget-targets: ${{ steps.config.outputs.nuget-targets }}
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Get project configuration
      id: config
      uses: ./.github/actions/get-config

  # Build the wheel and UI bundle exactly once so prod-containers, prod-pypi,
  # and github-assets all publish the identical artefact.
  build-wheel:
    name: Build Release Wheel
    needs: config
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Setup Python and UV
      uses: ./.github/actions/setup-uv-cached
      with:
        cache-key: prod-wheel-${{ needs.config.outputs.package-version }}
        fail-on-cache-miss: false

    - name: Setup Bun (for UI static bundle)
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
      with:
        bun-version: "1.2.15"  # pinned; update intentionally to avoid surprise breakage

    # The SPA bundle is built automatically by the setuptools build hook during
    # `make build` (python -m build). No separate step needed.
    - name: Build package wheel
      run: make build

    - name: Upload wheel artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
      with:
        name: release-wheel-${{ needs.config.outputs.package-version }}
        path: dist/
        retention-days: 1

  prod-containers:
    name: Build Production Containers
    needs: [config, build-wheel]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Only push/sign/attest images on a real GitHub Release.
    # Manual workflow_dispatch would build DEV-versioned images (1.x.y.devN)
    # and push+sign them to the prod GHCR registry, polluting it with
    # non-release artefacts.  The release gate here mirrors prod-manifests,
    # prod-pypi, and github-assets.
    if: github.event_name == 'release'
    strategy:
      # Each python-version variant scans, builds, and signs independently.
      # fail-fast: false ensures that one variant's CVE gate failure does not
      # cancel the other variants — each arch is self-contained.
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.config.outputs.python-versions) }}

    env:
      SCAN_LEVEL: ${{ matrix.python-version == needs.config.outputs.default-python-version && 'full' || 'basic' }}
      PUSH_TO_REGISTRY: true

    permissions:
      contents: read
      packages: write
      security-events: write
      # Required for keyless cosign signing (ambient OIDC token) and
      # actions/attest-build-provenance.
      id-token: write
      attestations: write

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4
      with:
        platforms: ${{ needs.config.outputs.build-platforms }}

    - name: Log in to Container Registry
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
      with:
        registry: ${{ needs.config.outputs.container-registry }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Download release wheel
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
      with:
        name: release-wheel-${{ needs.config.outputs.package-version }}
        path: dist/

    - name: Build container image locally for scanning (full scan gate)
      # For the default-Python 'full' scan we build with --load so Trivy can
      # inspect the image locally BEFORE it is pushed.  A CRITICAL/HIGH finding
      # will fail the job and prevent a vulnerable image from reaching the
      # registry.  Non-default Python versions use a --push build directly
      # (scan is advisory / exit-code 0) because the default-Python image is
      # the canonical security gate for the release.
      if: env.SCAN_LEVEL == 'full'
      id: build-local
      env:
        REGISTRY: ${{ needs.config.outputs.container-registry }}
        IMAGE_NAME: ${{ needs.config.outputs.container-image }}
        VERSION: ${{ needs.config.outputs.package-version }}
        PYTHON_VERSION: ${{ matrix.python-version }}
        BUILD_PLATFORMS: ${{ needs.config.outputs.build-platforms }}
        PACKAGE_NAME_SHORT: ${{ needs.config.outputs.short-name }}
      run: |
        # Build for the first/primary platform only so --load works (multi-arch
        # cannot be loaded into the local Docker daemon).
        SCAN_PLATFORM=$(echo "$BUILD_PLATFORMS" | cut -d, -f1)
        docker buildx build \
          --platform "$SCAN_PLATFORM" \
          --build-arg "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
          --build-arg "VERSION=$VERSION" \
          --build-arg "VCS_REF=$(git rev-parse --short HEAD)" \
          --build-arg "PYTHON_VERSION=$PYTHON_VERSION" \
          --build-arg "PACKAGE_NAME_SHORT=$PACKAGE_NAME_SHORT" \
          --cache-from type=gha \
          --load \
          -t "$REGISTRY/$IMAGE_NAME:$VERSION-python$PYTHON_VERSION" \
          .

    - name: Run Trivy security scan (gate — full, default Python)
      # exit-code: '1' blocks the push if CRITICAL or HIGH CVEs are found.
      # This is the security gate: the image is not pushed to GHCR until it
      # passes.  SCAN_LEVEL == 'full' only on the default Python matrix entry.
      # trivyignores honours the suppression file for known unfixable base-image
      # CVEs (e.g. Debian CVEs in the Python slim images) so the gate only fires
      # on actionable findings.
      if: env.SCAN_LEVEL == 'full'
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
      with:
        image-ref: "${{ needs.config.outputs.container-registry }}/${{ needs.config.outputs.container-image }}:${{ needs.config.outputs.package-version }}-python${{ matrix.python-version }}"
        format: 'sarif'
        output: 'trivy-results-py${{ matrix.python-version }}.sarif'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'
        trivyignores: .trivyignore

    - name: Build and push container image
      id: build
      env:
        REGISTRY: ${{ needs.config.outputs.container-registry }}
        IMAGE_NAME: ${{ needs.config.outputs.container-image }}
        VERSION: ${{ needs.config.outputs.package-version }}
        PYTHON_VERSION: ${{ matrix.python-version }}
        BUILD_PLATFORMS: ${{ needs.config.outputs.build-platforms }}
        PACKAGE_NAME_SHORT: ${{ needs.config.outputs.short-name }}
      run: |
        docker buildx build \
          --platform "$BUILD_PLATFORMS" \
          --build-arg "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
          --build-arg "VERSION=$VERSION" \
          --build-arg "VCS_REF=$(git rev-parse --short HEAD)" \
          --build-arg "PYTHON_VERSION=$PYTHON_VERSION" \
          --build-arg "PACKAGE_NAME_SHORT=$PACKAGE_NAME_SHORT" \
          --provenance=true \
          --sbom=true \
          --metadata-file metadata.json \
          --cache-from type=gha \
          --cache-to type=gha,mode=max \
          --push \
          -t "$REGISTRY/$IMAGE_NAME:$VERSION-python$PYTHON_VERSION" \
          .

        # Extract the immutable digest from the BuildKit metadata output.
        # containerimage.digest is the multi-arch index digest (sha256:…).
        DIGEST=$(jq -r '."containerimage.digest"' metadata.json)
        echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
        echo "image=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

        # Trivy cannot scan a multi-arch manifest — pull back a single-arch image
        # for the advisory scan (non-default Python).
        SCAN_PLATFORM=$(echo "$BUILD_PLATFORMS" | cut -d, -f1)
        docker pull --platform "$SCAN_PLATFORM" "$REGISTRY/$IMAGE_NAME:$VERSION-python$PYTHON_VERSION"

    - name: Install cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

    - name: Sign container image (keyless / OIDC)
      # Signs the immutable digest — not a mutable tag — using the GitHub OIDC
      # ambient credential.  The Rekor transparency-log entry records the
      # workflow identity, giving consumers a verifiable supply-chain link.
      env:
        DIGEST: ${{ steps.build.outputs.digest }}
        IMAGE: ${{ steps.build.outputs.image }}
      run: cosign sign --yes "$IMAGE@$DIGEST"

    - name: Attach SLSA provenance attestation
      # Generates a SLSA Build L2-conformant provenance attestation signed with
      # the GitHub OIDC token and pushes it to the registry alongside the image.
      # Complements the cosign signature: signature proves who signed; provenance
      # records exactly what was built and how (workflow, inputs, commit SHA).
      uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
      with:
        subject-name: ${{ steps.build.outputs.image }}
        subject-digest: ${{ steps.build.outputs.digest }}
        push-to-registry: true

    - name: Run Trivy security scan (advisory — non-default Python)
      # For non-default Python variants, the scan is advisory (exit-code 0).
      # The default-Python image already passed the gate above; these variants
      # share the same base image and package set, so findings here are
      # informational / uploaded to the Security tab.
      if: env.SCAN_LEVEL != 'full'
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
      with:
        image-ref: "${{ needs.config.outputs.container-registry }}/${{ needs.config.outputs.container-image }}:${{ needs.config.outputs.package-version }}-python${{ matrix.python-version }}"
        format: 'sarif'
        output: 'trivy-results-py${{ matrix.python-version }}.sarif'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'
        trivyignores: .trivyignore

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
      if: always()
      with:
        sarif_file: 'trivy-results-py${{ matrix.python-version }}.sarif'

  prod-manifests:
    name: Create Production Manifests
    needs: [config, prod-containers]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only repoint `latest` / version manifests on a real GitHub Release.
    # Manual workflow_dispatch builds images for testing but must not move prod tags.
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write
      # Required for keyless cosign signing of the manifest-list digests.
      id-token: write
      attestations: write

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Log in to Container Registry
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
      with:
        registry: ${{ needs.config.outputs.container-registry }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

    - name: Create production tag manifests
      id: manifests
      shell: bash
      env:
        REGISTRY: ${{ needs.config.outputs.container-registry }}
        IMAGE: ${{ needs.config.outputs.container-image }}
        VERSION: ${{ needs.config.outputs.package-version }}
        DEFAULT_PYTHON: ${{ needs.config.outputs.default-python-version }}
        IS_RELEASE: "true"
      run: |
        # Parse Makefile container tag output into shell variables in the same step.
        # GITHUB_ENV writes are only visible to SUBSEQUENT steps, so we assign
        # directly into the current shell environment instead.
        # get-container-tags-env emits "export KEY=VALUE" lines; strip the prefix and
        # validate the KEY=VALUE format before assigning (rejects subcommands etc.).
        while IFS= read -r line; do
          # Strip leading "export " if present
          kv="${line#export }"
          # Validate KEY=VALUE format before assigning (reject lines with subcommands etc.)
          if [[ "$kv" =~ ^([A-Za-z_][A-Za-z0-9_]*)=(.*)$ ]]; then
            declare "${BASH_REMATCH[1]}=${BASH_REMATCH[2]}"
          fi
        done < <(make get-container-tags-env)

        # Collect all created manifest-list digests so the signing step can sign them.
        MANIFEST_REFS=""

        # Create primary tags (latest, version)
        if [[ -n "${primary_tags:-}" ]]; then
          IFS=',' read -ra TAGS <<< "$primary_tags"
          for tag in "${TAGS[@]}"; do
            echo "Creating primary tag: $tag -> $VERSION-python$DEFAULT_PYTHON"
            docker buildx imagetools create \
              -t "$REGISTRY/$IMAGE:$tag" \
              "$REGISTRY/$IMAGE:$VERSION-python$DEFAULT_PYTHON"
            # Resolve the digest of the newly-created manifest list.
            DIGEST=$(docker buildx imagetools inspect --format '{{json .Manifest}}' "$REGISTRY/$IMAGE:$tag" | jq -r '.digest')
            MANIFEST_REFS="${MANIFEST_REFS} $REGISTRY/$IMAGE@$DIGEST"
          done
        fi

        # Create Python variant tags
        if [[ -n "${python_tags:-}" ]]; then
          IFS=',' read -ra TAGS <<< "$python_tags"
          for tag in "${TAGS[@]}"; do
            py_ver=${tag#python}
            echo "Creating Python variant tag: $tag -> $VERSION-python$py_ver"
            docker buildx imagetools create \
              -t "$REGISTRY/$IMAGE:$tag" \
              "$REGISTRY/$IMAGE:$VERSION-python$py_ver"
            DIGEST=$(docker buildx imagetools inspect --format '{{json .Manifest}}' "$REGISTRY/$IMAGE:$tag" | jq -r '.digest')
            MANIFEST_REFS="${MANIFEST_REFS} $REGISTRY/$IMAGE@$DIGEST"
          done
        fi

        # Deduplicate refs (multiple tags may resolve to the same digest).
        UNIQUE_REFS=$(echo "$MANIFEST_REFS" | tr ' ' '\n' | sort -u | tr '\n' ' ')
        echo "manifest-refs=${UNIQUE_REFS}" >> "$GITHUB_OUTPUT"

    - name: Sign manifest-list images (keyless / OIDC)
      # The per-python images were already signed in prod-containers; signing the
      # manifest lists (latest, version, pythonX.Y tags) closes the chain so
      # consumers of the convenience tags can also verify a signature.
      env:
        MANIFEST_REFS: ${{ steps.manifests.outputs.manifest-refs }}
      run: |
        for ref in $MANIFEST_REFS; do
          echo "Signing manifest list: $ref"
          cosign sign --yes "$ref"
        done

    - name: Attest SLSA provenance for manifest-list images
      # Attach SLSA Build L2 provenance to each unique manifest-list digest so
      # consumers of the convenience tags (latest, version, pythonX.Y)
      # can verify full supply-chain provenance — not just the cosign signature.
      # After deduplication the set is small (one digest per distinct Python
      # version + one for the default-Python "latest"/"version" tags if they
      # differ).  The gh CLI's attestation subcommand is not suitable here;
      # actions/attest-build-provenance accepts one subject per call and pushes
      # the Sigstore OIDC attestation to the registry.  We emit the refs into
      # step outputs so callers can fan them out via a follow-on action step.
      id: attest-manifests-prep
      env:
        MANIFEST_REFS: ${{ steps.manifests.outputs.manifest-refs }}
      run: |
        # Emit the first unique ref as "primary" (covers latest/version tags).
        # All unique digests are already in MANIFEST_REFS; pick the first one
        # for a single structured attest-build-provenance call.  Additional
        # per-python variant digests are attested in the loop step that follows.
        FIRST=$(echo "$MANIFEST_REFS" | tr ' ' '\n' | grep -v '^$' | head -1)
        {
          echo "first-image=${FIRST%%@*}"
          echo "first-digest=${FIRST##*@}"
          # Persist the full list for the batch attest step.
          echo "all-refs=${MANIFEST_REFS}"
        } >> "$GITHUB_OUTPUT"

    - name: Attest SLSA provenance for manifest-list (primary tag)
      # Attests the first/primary manifest-list digest (latest/version tag).
      # This covers the most common consumer path.
      uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
      with:
        subject-name: ${{ steps.attest-manifests-prep.outputs.first-image }}
        subject-digest: ${{ steps.attest-manifests-prep.outputs.first-digest }}
        push-to-registry: true

  prod-pypi:
    name: Publish to PyPI
    needs: [config, build-wheel]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only publish to production PyPI on a real GitHub Release.
    # Manual dispatch must not push a dev-build version to prod PyPI.
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Setup Python and UV
      uses: ./.github/actions/setup-uv-cached
      with:
        cache-key: prod-pypi-${{ needs.config.outputs.package-version }}
        fail-on-cache-miss: false

    - name: Download release wheel
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
      with:
        name: release-wheel-${{ needs.config.outputs.package-version }}
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
      with:
        print-hash: true
        verbose: true
        attestations: true

  prod-docs:
    name: Deploy Production Documentation
    needs: config
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        fetch-depth: 0

    - name: Setup Python and UV
      uses: ./.github/actions/setup-uv-cached
      with:
        cache-key: prod-docs-${{ needs.config.outputs.package-version }}
        fail-on-cache-miss: false

    - name: Compute minor version
      id: version
      run: |
        VERSION_MINOR=$(echo "${{ needs.config.outputs.package-version }}" | cut -d. -f1,2)
        echo "minor=${VERSION_MINOR}" >> "$GITHUB_OUTPUT"

    - name: Deploy versioned docs via mike
      run: bash dev-tools/docs/mike_deploy.sh release "${{ steps.version.outputs.minor }}" --push

    - name: Upload Pages artifact
      id: upload
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5
      with:
        path: docs/site

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5

    - name: Smoke-check deployed site
      run: bash dev-tools/docs/smoke_check_pages.sh "${{ steps.deployment.outputs.page_url }}"

  container-cleanup:
    name: Cleanup Old Container Images
    needs: [config, prod-manifests]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      packages: write

    steps:
    - name: Delete untagged container images
      uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55  # v5
      with:
        package-name: ${{ github.event.repository.name }}
        package-type: container
        min-versions-to-keep: 0
        delete-only-untagged-versions: true

  github-assets:
    name: Upload GitHub Release Assets
    # prod-containers intentionally removed from needs: wheel signing + GH release
    # asset upload must run on every release independent of container health.
    # A container base-image CVE (Trivy gate) must not prevent the Python
    # wheel/sdist from being signed and published.  prod-manifests (which
    # legitimately needs the pushed images) retains its prod-containers dep.
    needs: [config, build-wheel, prod-pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only upload assets and create gh release upload on a real GitHub Release.
    # Manual dispatch would compute a dev version tag (1.x.y.devN) and fail on
    # `gh release upload` because that tag doesn't exist as a release.
    if: github.event_name == 'release'
    permissions:
      contents: write
      id-token: write    # required by actions/attest-build-provenance (Sigstore OIDC)
      attestations: write  # required to persist attestation to GitHub's attestations store

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Setup Python and UV
      uses: ./.github/actions/setup-uv-cached
      with:
        cache-key: prod-assets-${{ needs.config.outputs.package-version }}
        fail-on-cache-miss: false

    - name: Download release wheel
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
      with:
        name: release-wheel-${{ needs.config.outputs.package-version }}
        path: dist/

    - name: Generate SBOM
      run: make sbom-generate

    - name: Attest build provenance for release artifacts
      # Generates a Sigstore in-toto provenance attestation for the wheel and
      # sdist.  The bundle is also uploaded to GitHub's attestations API so it
      # is queryable via `gh attestation verify`.  We additionally attach it as
      # a release asset (see next step) so OpenSSF Scorecard's Signed-Releases
      # check — which scans release assets for .intoto.jsonl files — can
      # discover it and score the release at 10/10.
      #
      # SHA pinned to actions/attest-build-provenance v4.1.1.
      # Verify: https://github.com/actions/attest-build-provenance/releases/tag/v4.1.1
      id: attest-artifacts
      uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
      with:
        subject-path: 'dist/*.whl, dist/*.tar.gz'

    - name: Attest OpenAPI spec provenance
      # Attach the same SLSA Build L2 attestation to the OpenAPI spec so
      # external codegen consumers can verify the spec's supply-chain.
      # The spec is published as a release asset (next step) with a stable
      # versioned filename so consumers can pin a URL.
      id: attest-spec
      uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
      with:
        subject-path: 'sdk/spec/openapi.json'

    - name: Upload release assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ needs.config.outputs.package-version }}"
        RELEASE_TAG="v$VERSION"

        # Upload wheel and sdist
        gh release upload "$RELEASE_TAG" dist/*.whl dist/*.tar.gz --clobber

        # Upload the authoritative OpenAPI spec as a stable versioned asset.
        # External SDK consumers and codegen pipelines can reference this URL:
        #   https://github.com/<owner>/<repo>/releases/download/v<VERSION>/openapi-v<VERSION>.json
        cp sdk/spec/openapi.json "openapi-v${VERSION}.json"
        gh release upload "$RELEASE_TAG" "openapi-v${VERSION}.json" --clobber

        # Upload SBOM files if present.
        # sbom-generate produces: python-sbom-cyclonedx.json (CycloneDX),
        # python-sbom.json (pip-audit JSON), and python-sbom-spdx.json (SPDX).
        # syft is installed by the sbom-generate make target, so all three
        # should be present; the -f guard makes the step resilient to partial
        # runs.
        for f in python-sbom-cyclonedx.json python-sbom.json python-sbom-spdx.json; do
          if [[ -f "$f" ]]; then
            gh release upload "$RELEASE_TAG" "$f" --clobber
          fi
        done

        # Upload the Sigstore attestation bundle as a .intoto.jsonl release asset
        # so OpenSSF Scorecard's Signed-Releases check (which looks for this
        # extension on release assets) can detect provenance and score 10/10.
        BUNDLE_SRC="${{ steps.attest-artifacts.outputs.bundle-path }}"
        BUNDLE_DEST="attestation-v${VERSION}.intoto.jsonl"
        cp "$BUNDLE_SRC" "$BUNDLE_DEST"
        gh release upload "$RELEASE_TAG" "$BUNDLE_DEST" --clobber

  # ---------------------------------------------------------------------------
  # SDK publishing — moved into reusable-sdk-publish.yml (invoked by the
  # sdk-publish caller job below) so the same publish logic serves BOTH the
  # release channel (here) and the TEST channel (dev-sdk.yml -> GitHub Packages).
  #
  # Go SDK distribution note:
  #   Go distribution is tag-based: the Go module proxy (proxy.golang.org) serves
  #   the SDK at github.com/finos/open-resource-broker/sdk/go when the git tag
  #   sdk/go/vX.Y.Z exists on the default branch.  The sdk-publish-go job inside
  #   reusable-sdk-publish.yml creates and pushes this tag (make sdk-go-tag) on
  #   the release channel, pointing at the vX.Y.Z release commit, whose contents
  #   already include the bumped sdk/go/orb/version.go (stamped in the
  #   semantic-release build hook).  It authenticates with the ORB CICD App token
  #   because the tag push targets a possibly branch-protected ref.  This used to
  #   be the "Tag Go SDK module" step in semantic-release.yml.
  # ---------------------------------------------------------------------------

  # Gate the SDK publish caller on a passing static spec-conformance check for
  # THIS release commit.  The SDK build+contract workflow (sdk.yml) is
  # path-filtered (sdk/** plus the API source that shapes the exported spec), so
  # a release commit that touched none of those paths would never have run it —
  # without this gate a tagged release could publish SDKs whose spec conformance
  # was never verified for the released commit.
  sdk-spec-conformance:
    name: SDK Spec Conformance Gate
    needs: config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'release'
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Check parity scenario against the OpenAPI spec
      run: python3 dev-tools/quality/validate_sdk_spec_conformance.py

  # ---------------------------------------------------------------------------
  # Unified SDK publish (release channel).  The npm/maven/kotlin/nuget/go publish
  # jobs live in reusable-sdk-publish.yml so the publish logic is defined ONCE
  # and shared with the TEST channel (dev-sdk.yml -> GitHub Packages).  This
  # caller forwards the release version and the per-language destination arrays
  # computed by get-config (.project.yml -> npm/maven/nuget targets).
  #
  # Gating: only on a real GitHub Release (mirrors prod-pypi) and only AFTER the
  # sdk-spec-conformance gate passes for THIS release commit — the reusable
  # workflow deliberately does NOT re-run that static gate, so the release
  # caller enforces it here via needs.
  # ---------------------------------------------------------------------------
  sdk-publish:
    name: Publish SDKs (release)
    needs: [config, github-assets, sdk-spec-conformance]
    if: github.event_name == 'release'
    # A reusable workflow can only DOWNGRADE the caller's token, never elevate
    # it. The top-level permissions block omits id-token (=none), so without
    # this job-level grant the reusable's sdk-publish-npm job cannot get
    # id-token: write and `npm publish --provenance` hard-fails. Grant exactly
    # what the reusable's jobs need here (least-privilege — only this caller and
    # sdk-bootstrap get id-token, not the whole workflow).
    permissions:
      contents: read
      packages: write    # GitHub Packages push (github destination)
      id-token: write    # npm provenance attestation + OIDC (npmjs destination)
    uses: ./.github/workflows/reusable-sdk-publish.yml
    secrets: inherit
    with:
      channel: release
      version: ${{ needs.config.outputs.package-version }}
      npm-targets: ${{ needs.config.outputs.npm-targets }}
      maven-targets: ${{ needs.config.outputs.maven-targets }}
      nuget-targets: ${{ needs.config.outputs.nuget-targets }}
      # The automatic release always publishes npm/NuGet via OIDC trusted
      # publishing (explicit — not relying on the reusable's default).
      auth-mode: trusted

  # ---------------------------------------------------------------------------
  # One-off SDK bootstrap (manual dispatch only). Publishes exactly ONE SDK to
  # ONE registry, off a release, so a package name can be seeded on a public
  # registry the first time (npm/NuGet trusted-publishing both require the
  # package to already exist before a policy can be attached — see the
  # publishing runbook). The chosen SDK gets a one-element target array; the
  # other two get '[]' so their matrices are empty and those jobs no-op.
  # Reuses the exact same publish logic as the release channel.
  # ---------------------------------------------------------------------------
  sdk-bootstrap:
    name: Bootstrap one SDK (${{ github.event.inputs.bootstrap_sdk }} -> ${{ github.event.inputs.bootstrap_destination }})
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.bootstrap_sdk != 'none'
    # Same rationale as sdk-publish: the reusable workflow cannot elevate the
    # caller's token, so grant id-token: write here or `npm publish
    # --provenance` fails when bootstrapping the npmjs destination.
    permissions:
      contents: read
      packages: write    # GitHub Packages push (github destination)
      id-token: write    # npm provenance attestation + OIDC (npmjs destination)
    uses: ./.github/workflows/reusable-sdk-publish.yml
    secrets: inherit
    with:
      # 'bootstrap' channel: same publish logic as release, but the Go tag job
      # (gated if: channel == 'release') stays OFF — bootstrap only ever seeds
      # ONE registry SDK, never the Go module tag.
      channel: bootstrap
      version: ${{ github.event.inputs.version }}
      npm-targets: ${{ github.event.inputs.bootstrap_sdk == 'npm' && format('["{0}"]', github.event.inputs.bootstrap_destination) || '[]' }}
      maven-targets: ${{ github.event.inputs.bootstrap_sdk == 'maven' && format('["{0}"]', github.event.inputs.bootstrap_destination) || '[]' }}
      nuget-targets: ${{ github.event.inputs.bootstrap_sdk == 'nuget' && format('["{0}"]', github.event.inputs.bootstrap_destination) || '[]' }}
      # Bootstrap chooses auth explicitly via the dispatch input (default 'token'
      # for the seed; 'trusted' once a trusted-publisher policy exists). Irrelevant
      # to maven (always token+GPG).
      auth-mode: ${{ github.event.inputs.auth_mode }}

  # ---------------------------------------------------------------------------
  # SDK archival assets — attach the built SDK artifacts (npm .tgz, java +
  # kotlin .jar, .nupkg) plus a .sha256 for each to the GitHub Release.  These
  # are ARCHIVAL only: the registries (npm/GitHub Packages, Maven, NuGet) remain
  # the real distribution channels.  Building all four toolchains in one job
  # would be heavy and serial, so this is a dedicated job separate from
  # github-assets (which owns the wheel/spec/sbom/attestation).  It reuses the
  # same generate-then-build steps as the publish jobs and is release-gated.
  # ---------------------------------------------------------------------------
  sdk-assets:
    name: Attach SDK Archival Assets to Release
    needs: [config, github-assets]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Mirror github-assets: only attach on a real GitHub Release (gh release
    # upload needs the release tag to exist).
    if: github.event_name == 'release'
    permissions:
      contents: write    # gh release upload

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Set up Node.js 20
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: '20'

    - name: Set up Java (Corretto 17)
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
      with:
        java-version: '17'
        distribution: 'corretto'

    - name: Set up .NET 8
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4
      with:
        dotnet-version: '8.0.x'

    - name: Install openapi-generator-cli
      run: npx --yes @openapitools/openapi-generator-cli version-manager set 7.23.0

    # REQUIRED: generated models are gitignored (0 committed files) for every
    # language — regenerate before building the archival artifacts.
    - name: Generate all SDK models
      run: |
        make sdk-typescript-generate
        make sdk-java-generate
        make sdk-kotlin-generate
        make sdk-csharp-generate

    - name: Set SDK versions from release tag
      run: |
        VERSION="${{ needs.config.outputs.package-version }}"
        cd sdk/typescript && npm version "$VERSION" --no-git-tag-version && cd -
        sed -i "s/^version = .*/version = '$VERSION'/" sdk/java/build.gradle
        sed -i "s/^version = .*/version = \"$VERSION\"/" sdk/kotlin/build.gradle.kts
        sed -i "s|<Version>.*</Version>|<Version>$VERSION</Version>|" \
          sdk/csharp/src/FINOS.OpenResourceBroker/FINOS.OpenResourceBroker.csproj
        sed -i "s|<Version>.*</Version>|<Version>$VERSION</Version>|" \
          sdk/csharp/generated/src/OpenResourceBroker.Sdk/OpenResourceBroker.Sdk.csproj

    - name: Build SDK artifacts (tgz, jars, nupkg)
      run: |
        mkdir -p /tmp/sdk-assets
        # TypeScript: npm pack produces a .tgz tarball.
        cd sdk/typescript && npm ci && npm run build
        npm pack --pack-destination /tmp/sdk-assets
        cd -
        # Java: gradle build produces the jar under build/libs/.
        cd sdk/java && ./gradlew --no-daemon build -x test
        cp build/libs/*.jar /tmp/sdk-assets/
        cd -
        # Kotlin: gradle build produces the jar under build/libs/.
        cd sdk/kotlin && ./gradlew --no-daemon build -x test
        cp build/libs/*.jar /tmp/sdk-assets/
        cd -
        # .NET: dotnet pack produces the .nupkg.
        dotnet pack sdk/csharp/src/FINOS.OpenResourceBroker/FINOS.OpenResourceBroker.csproj \
          --configuration Release \
          --output /tmp/sdk-assets

    - name: Compute SHA-256 checksums
      run: |
        cd /tmp/sdk-assets
        for f in *; do
          [[ "$f" == *.sha256 ]] && continue
          sha256sum "$f" > "$f.sha256"
        done
        ls -la /tmp/sdk-assets

    - name: Upload SDK artifacts to release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ needs.config.outputs.package-version }}"
        RELEASE_TAG="v$VERSION"
        gh release upload "$RELEASE_TAG" /tmp/sdk-assets/* --clobber

  # ---------------------------------------------------------------------------
  # Roll-up gate: the single canonical "did the release train succeed" signal.
  # Mirrors the 'CI Passed' alls-green aggregation in ci-tests.yml.  Reads every
  # publish + asset job's result, writes a markdown table to the step summary,
  # and fails if ANY needed job failed or was cancelled.  Legitimately-gated
  # 'skipped' jobs (e.g. a destination disabled in .project.yml) are treated as
  # OK — alls-green's allowed-skips handles this.
  # ---------------------------------------------------------------------------
  release-complete:
    name: Release Complete
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - config
      - prod-containers
      - prod-manifests
      - prod-pypi
      - github-assets
      - sdk-spec-conformance
      - sdk-publish
      - sdk-bootstrap
      - sdk-assets

    steps:
    - name: Write release train summary
      # Emit a job -> result markdown table to the run summary so the release
      # outcome is visible at a glance.
      run: |
        {
          echo "## Release Train Summary"
          echo ""
          echo "| Job | Result |"
          echo "| --- | --- |"
          echo "| prod-containers | ${{ needs.prod-containers.result }} |"
          echo "| prod-manifests | ${{ needs.prod-manifests.result }} |"
          echo "| prod-pypi | ${{ needs.prod-pypi.result }} |"
          echo "| github-assets | ${{ needs.github-assets.result }} |"
          echo "| sdk-spec-conformance | ${{ needs.sdk-spec-conformance.result }} |"
          echo "| sdk-publish | ${{ needs.sdk-publish.result }} |"
          echo "| sdk-bootstrap | ${{ needs.sdk-bootstrap.result }} |"
          echo "| sdk-assets | ${{ needs.sdk-assets.result }} |"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Fail if any release job failed or was cancelled
      # Single source of truth for the release outcome.  alls-green fails when
      # any listed job's result is 'failure' or 'cancelled'; 'skipped' jobs
      # (destinations gated off in .project.yml, or manual-dispatch-gated jobs)
      # are permitted.
      uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # v1.2.2
      with:
        jobs: ${{ toJSON(needs) }}
        # sdk-bootstrap is an ALLOWED SKIP: on a normal release it never runs
        # (dispatch-gated), so it must not fail the gate. alls-green still fails
        # on a 'failure' result regardless of allowed-skips, so a dispatch where
        # the bootstrap actually runs and FAILS still fails the release gate.
        allowed-skips: prod-containers, prod-manifests, prod-pypi, github-assets, sdk-spec-conformance, sdk-publish, sdk-bootstrap, sdk-assets
